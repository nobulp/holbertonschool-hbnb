<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="place.html">Place Details</a>
            <a href="add_review.html">Add Review</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <form id="login-form" method="post">
                <h1>Login</h1>
                <p class="form-copy">Sign in to book a place or leave a review.</p>
                <p id="login-message" class="form-message" aria-live="polite"></p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" autocomplete="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>

                <button type="submit">Login</button>
            </form>
        </section>
    </main>
    <footer>
        <p>All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
