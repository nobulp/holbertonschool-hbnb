<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="place.html">Place Details</a>
            <a href="add_review.html">Add Review</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div>
                <p class="eyebrow">Find your next stay</p>
                <h1>Comfortable places for every kind of trip.</h1>
                <p class="hero-copy">Browse a curated selection of homes, beach escapes, and mountain cabins.</p>
            </div>
        </section>
        <section id="filter" class="filter-bar">
            <label for="price-filter">Max Price</label>
            <select id="price-filter" name="price-filter">
                <option value="all">All</option>
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </section>
        <section id="places-list" class="places-grid">
            <p id="places-status" class="places-status">Loading places...</p>
        </section>
    </main>
    <footer>
        <p>All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
